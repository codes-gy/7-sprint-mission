name: Test
on:
  pull_request:
    #branches: ["main", "develop"]
    branches: ["**"]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: 소스코드 받아오기
        uses: actions/checkout@v4

      - name: Node.js 설정하기
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: 의존성 설치
        run: npm install

      - name: Prisma 준비하기
        run: npx prisma generate

      - name: 타입체크
        run: npx tsc --noEmit
  test:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 받아오기
        uses: actions/checkout@v4

      - name: Node.js 설정하기
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: 의존성 설치
        run: npm install

      - name: Prisma 준비하기
        run: npx prisma generate

      - name: 테스트 실행하기
        run: npm test